name: ClipStash
options:
  deploymentTarget:
    macOS: "13.0"
  bundleIdPrefix: com.clipstash
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.35.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  ClipStash:
    type: application
    platform: macOS
    sources:
      - Sources
    resources:
      - Resources
    info:
      path: Sources/App/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: ClipStash
        CFBundleDisplayName: ClipStash
        CFBundleIdentifier: com.clipstash.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        NSHumanReadableCopyright: "Copyright © 2024 ClipStash. All rights reserved."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clipstash.app
        INFOPLIST_FILE: Sources/App/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        PRODUCT_NAME: ClipStash
        COMBINE_HIDPI_IMAGES: true
    dependencies: []
